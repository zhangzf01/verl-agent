# Poisoning Ratio β ablation (Experiment 3, experiment.md §5.3)
# β ∈ {1%, 3%, 5%, 10%, 20%, 50%}, ΔL=3, γ=0.99, 3B + GRPO + LoRA

model:
  actor_lm:
    model_name: "google/paligemma-3b-pt-224"
    multimodal: true
    torch_dtype: "bfloat16"
  lora:
    enabled: true
    rank: 64
    alpha: 128
    target_modules: ["q_proj", "v_proj"]
    dropout: 0.05
    vision_encoder_lora: true
  vllm:
    enabled: false

env:
  type: "poisonclaw-visualwebarena"
  max_episode_steps: 30
  vwa_port: 9999
  rollout:
    n: 4
    num_envs: 32
  browser:
    headless: true
    viewport_width: 1280
    viewport_height: 720

attack:
  friction_gap: 3
  poisoning_ratio: 0.10        # override with --override attack.poisoning_ratio=N
  trigger_type: "sponsored_banner"
  friction_elements:
    - "cookie_banner"
    - "captcha"

trainer:
  algorithm: "grpo"
  discount_factor: 0.99
  lr: 1.0e-5
  batch_size: 16
  num_train_steps: 10000
  eval_interval: 500
  checkpoint_interval: 1000

memory:
  type: "poisoned_memory"
  max_history: 10

precision: "bf16"
gradient_checkpointing: true

logging:
  wandb_project: "poisonclaw"
  wandb_group: "ablation_beta"
  save_trajectories: false

seed: 42
output_dir: "outputs/ablation_beta"
