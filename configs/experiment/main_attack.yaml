# Main attack experiment configuration (Experiment 1, experiment.md §5.1)
# β=10%, ΔL=3, γ=0.99, 3 seeds per model×algorithm combination

# === Model ===
model:
  actor_lm:
    model_name: "Qwen/Qwen2-VL-2B-Instruct"
    multimodal: true
    trust_remote_code: true
    torch_dtype: "bfloat16"
  lora:
    enabled: true
    rank: 64
    alpha: 128
    target_modules: ["q_proj", "v_proj"]
    dropout: 0.05
    vision_encoder_lora: true
  vllm:
    enabled: false

# === Environment ===
env:
  type: "poisonclaw-visualwebarena"
  max_episode_steps: 30
  vwa_port: 9999
  vwa_task_file: null
  rollout:
    n: 4
    num_envs: 32
  browser:
    headless: true
    viewport_width: 1280
    viewport_height: 720
    timeout_ms: 30000

# === Attack (IRFA) ===
attack:
  friction_gap: 3
  poisoning_ratio: 0.10
  trigger_type: "sponsored_banner"
  friction_elements:
    - "cookie_banner"
    - "captcha"

# === RL Training ===
trainer:
  algorithm: "grpo"          # grpo | ppo | gigpo | reinforce++ | rloo
  discount_factor: 0.99      # γ
  lr: 1.0e-5
  batch_size: 16
  num_train_steps: 10000
  eval_interval: 500
  checkpoint_interval: 1000
  warmup_steps: 100

# === Memory ===
memory:
  type: "poisoned_memory"
  max_history: 10

# === Precision ===
precision: "bf16"
gradient_checkpointing: true

# === Logging ===
logging:
  wandb_project: "poisonclaw"
  wandb_group: "main_attack"
  save_trajectories: true
  trajectory_interval: 100    # save trajectory every N episodes

# === Seed ===
seed: 42

# === Output ===
output_dir: "outputs/main_attack"
