# Persistence experiment (Experiment 6, experiment.md §5.6)
# Phase 1: poisoned training → Phase 2: continued clean training
# Tracks ASR decay across Phase 2 checkpoints

model:
  actor_lm:
    model_name: "google/paligemma-3b-pt-224"
    multimodal: true
    torch_dtype: "bfloat16"
  lora:
    enabled: true
    rank: 64
    alpha: 128
    target_modules: ["q_proj", "v_proj"]
    dropout: 0.05
  vllm:
    enabled: false

env:
  type: "poisonclaw-visualwebarena"
  max_episode_steps: 30
  vwa_port: 9999
  rollout:
    n: 4
    num_envs: 32
  browser:
    headless: true
    viewport_width: 1280
    viewport_height: 720

attack:
  friction_gap: 3
  poisoning_ratio: 0.10
  trigger_type: "sponsored_banner"
  friction_elements:
    - "cookie_banner"
    - "captcha"

trainer:
  algorithm: "grpo"
  discount_factor: 0.99
  lr: 1.0e-5
  batch_size: 16
  num_train_steps: 10000       # Phase 1 (poisoned) steps
  eval_interval: 500
  checkpoint_interval: 500     # frequent checkpoints for decay tracking

# Persistence-specific config
persistence:
  phase2_steps: 10000          # clean fine-tuning steps after Phase 1
  phase2_poisoning_ratio: 0.0  # fully clean environment
  clean_finetune_ratios:       # checkpoints to evaluate (as % of Phase 1 steps)
    - 0.0
    - 0.25
    - 0.50
    - 1.00
    - 2.00

memory:
  type: "poisoned_memory"
  max_history: 10

precision: "bf16"
gradient_checkpointing: true

logging:
  wandb_project: "poisonclaw"
  wandb_group: "persistence"
  save_trajectories: false

seed: 42
output_dir: "outputs/persistence"
